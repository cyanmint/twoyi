name: Build APK

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install NDK
      run: |
        echo "y" | sdkmanager "ndk;21.4.7075529"
        
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android
        
    - name: Install cargo-xdk
      run: |
        cargo install cargo-xdk --git https://github.com/tiann/cargo-xdk
        
    - name: Download rootfs for testing (if not exists)
      run: |
        if [ ! -f app/src/main/assets/rootfs.7z ]; then
          mkdir -p app/src/main/assets
          # Download the test rootfs
          curl -L -o /tmp/rootfs.7z https://github.com/cyanmint/twoyi/releases/download/original/rootfs.7z
          mv /tmp/rootfs.7z app/src/main/assets/rootfs.7z
        fi
        
    - name: Download rom.ini for testing (if not exists)
      run: |
        if [ ! -f app/src/main/assets/rom.ini ]; then
          mkdir -p app/src/main/assets
          # Create a basic rom.ini file
          cat > app/src/main/assets/rom.ini << EOF
        author=weishu
        version=1.0.0
        code=1
        desc=Official TwoYi ROM
        md5=
        EOF
        fi
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: twoyi-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        
    - name: Upload build reports on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: app/build/reports/
        retention-days: 7
