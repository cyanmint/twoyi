---
name: Build APK

'on':
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'gradle'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android
          cache: true

      - name: Cache cargo-xdk
        id: cache-cargo-xdk
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-xdk
          key: ${{ runner.os }}-cargo-xdk-2.12.6

      - name: Install cargo-xdk
        if: steps.cache-cargo-xdk.outputs.cache-hit != 'true'
        run: cargo install cargo-xdk
      
      - name: Verify cargo-xdk installation
        run: cargo xdk --version

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean build
        run: ./gradlew clean

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Verify build outputs
        run: |
          echo "=== Build Verification ==="
          echo "Checking APK file..."
          ls -lh app/build/outputs/apk/release/*.apk
          
          echo ""
          echo "Checking native libraries in APK..."
          unzip -l app/build/outputs/apk/release/*.apk | grep -E "lib/arm64-v8a/.*\.so"
          
          echo ""
          echo "Verifying libtwoyi.so contains OpenGL renderer functions..."
          cd /tmp
          unzip -o $(ls /home/runner/work/twoyi/twoyi/app/build/outputs/apk/release/*.apk) lib/arm64-v8a/libtwoyi.so >/dev/null 2>&1
          nm -D lib/arm64-v8a/libtwoyi.so | grep -E "startOpenGLRenderer|setNativeWindow|resetSubWindow|removeSubWindow|destroyOpenGLSubwindow|repaintOpenGLDisplay"
          
          echo ""
          echo "✅ Build verification complete - All checks passed!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: twoyi-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
